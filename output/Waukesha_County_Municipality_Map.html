<!DOCTYPE html>
<html><head><meta charset="utf-8"/><title>Waukesha County Growth Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>body {margin:0;padding:0;font-family:Arial,sans-serif;} #map {height:100vh;width:100vw;}
.muni-label {background:none!important;border:none!important;}
.muni-label div {box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.legend {background:white;padding:10px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-size:11px;}
.legend-item {display:flex;align-items:center;gap:6px;}
.legend-color {width:12px;height:12px;border-radius:2px;flex-shrink:0;}
.note {position:absolute;bottom:10px;right:10px;z-index:1000;background:rgba(255,255,255,0.85);padding:4px 10px;border-radius:4px;font-size:11px;}
</style></head><body>
<div id="map"></div>
<div id="legend" class="legend" style="position:absolute;bottom:50px;left:10px;z-index:1000;">
<b>Waukesha County Growth Map</b><br>
<div class="legend-item"><div class="legend-color" style="background:#4CAF50"></div>High</div>
<div class="legend-item"><div class="legend-color" style="background:#8BC34A"></div>Moderate to High</div>
<div class="legend-item"><div class="legend-color" style="background:#FFC107"></div>Moderate</div>
<div class="legend-item"><div class="legend-color" style="background:#FF9800"></div>Low to Moderate</div>
<div class="legend-item"><div class="legend-color" style="background:#F44336"></div>Low</div>
</div>
<div class="note">Waukesha County, WI</div>
<script>var map=L.map('map').setView([43.01,-88.23],10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'©OSM'}).addTo(map);
L.control.layers({"Map":L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
"Satellite":L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'©Esri'})
},null,{position:'topright'}).addTo(map);
var md=[{"n": "Waukesha", "r": "Moderate", "t": "City", "lat": 43.01, "lon": -88.232, "c": "#FFC107", "s": 16}, {"n": "Menomonee Falls", "r": "High", "t": "Village", "lat": 43.178, "lon": -88.114, "c": "#4CAF50", "s": 16}, {"n": "New Berlin", "r": "Moderate", "t": "City", "lat": 42.976, "lon": -88.108, "c": "#FFC107", "s": 14}, {"n": "Sussex", "r": "High", "t": "Village", "lat": 43.134, "lon": -88.222, "c": "#4CAF50", "s": 15}, {"n": "Pewaukee", "r": "High", "t": "Village", "lat": 43.076, "lon": -88.254, "c": "#4CAF50", "s": 15}];var mL=L.layerGroup();
md.forEach(function(m){L.circleMarker([m.lat,m.lon],{radius:5,fillColor:m.c,color:'#333',weight:1.5,fillOpacity:0.8}).bindPopup('<b>'+m.n+'</b><br>'+m.t+'<br>Growth: '+m.r).addTo(mL);
L.marker([m.lat,m.lon],{icon:L.divIcon({className:'muni-label',html:'<div style="background:'+m.c+';color:#fff;padding:2px 8px;border-radius:12px;font-size:'+m.s+'px;font-weight:bold;white-space:nowrap;border:1px solid #333;">'+m.n+'</div>',iconSize:[0,0],iconAnchor:[0,0]})}).addTo(mL);});
mL.addTo(map);L.control.layers(null,{"Labels":mL},{position:'topright'}).addTo(map);</script></body></html>
